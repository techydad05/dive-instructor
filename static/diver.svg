<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 96" width="64" height="96">
  <defs>
    <linearGradient id="wetsuit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="tankGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#546e7a"/>
      <stop offset="40%" stop-color="#78909c"/>
      <stop offset="100%" stop-color="#37474f"/>
    </linearGradient>
    <linearGradient id="finGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0a3d7a"/>
    </linearGradient>
    <linearGradient id="maskGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
  </defs>

  <!-- Bubbles (behind diver) -->
  <g opacity="0.5">
    <circle cx="28" cy="6" r="1.8" fill="none" stroke="#90caf9" stroke-width="0.6">
      <animate attributeName="cy" from="10" to="-2" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.6" to="0" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="24" cy="4" r="1.2" fill="none" stroke="#90caf9" stroke-width="0.5">
      <animate attributeName="cy" from="8" to="-1" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" from="0.5" to="0" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="30" cy="3" r="1" fill="none" stroke="#90caf9" stroke-width="0.5">
      <animate attributeName="cy" from="6" to="-1" dur="3.2s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" from="0.4" to="0" dur="3.2s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="35" cy="5" r="1.4" fill="none" stroke="#64b5f6" stroke-width="0.5">
      <animate attributeName="cy" from="9" to="-2" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="opacity" from="0.5" to="0" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
  </g>

  <!-- SCUBA TANK -->
  <rect x="26" y="26" width="12" height="38" rx="5" fill="url(#tankGrad)"/>
  <rect x="26" y="24" width="12" height="4" rx="2" fill="#455a64"/>
  <rect x="28" y="27" width="8" height="3" rx="1" fill="#546e7a" opacity="0.5"/>
  <!-- Tank valve -->
  <rect x="30" y="22" width="4" height="3" rx="1" fill="#78909c"/>
  <rect x="31" y="20" width="2" height="2" rx="0.5" fill="#90a4ae"/>

  <!-- BODY / WETSUIT -->
  <path d="M20 38 Q17 42 17 48 L17 58 Q17 62 20 62 L44 62 Q47 62 47 58 L47 48 Q47 42 44 38 Z" fill="url(#wetsuit)"/>
  <!-- Wetsuit chest line -->
  <path d="M24 38 Q22 42 22 46" fill="none" stroke="#1565c0" stroke-width="1.5" opacity="0.5"/>
  <path d="M40 38 Q42 42 42 46" fill="none" stroke="#1565c0" stroke-width="1.5" opacity="0.5"/>

  <!-- BC (Buoyancy Compensator) harness -->
  <path d="M22 40 L18 42 L16 40 L18 38 L22 36 L42 36 L46 38 L48 40 L46 42 L42 40 Z" fill="none" stroke="#1a237e" stroke-width="1.8" opacity="0.6"/>
  <path d="M32 36 L32 55" stroke="#1a237e" stroke-width="1.2" opacity="0.4"/>

  <!-- REGULATOR HOSE -->
  <path d="M31 22 Q34 18 38 20 Q42 22 40 25 Q38 28 36 27" fill="none" stroke="#546e7a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Regulator 2nd stage -->
  <ellipse cx="36" cy="28" rx="3" ry="2" fill="#455a64"/>
  <circle cx="36" cy="28" r="1.2" fill="#37474f"/>

  <!-- LEFT ARM (raised, swimming pose) -->
  <path d="M20 42 L12 34 L8 28" fill="none" stroke="#1976d2" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left hand -->
  <circle cx="8" cy="28" r="2.5" fill="#1565c0"/>

  <!-- RIGHT ARM (raised, swimming pose) -->
  <path d="M44 42 L52 34 L56 28" fill="none" stroke="#1976d2" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right hand -->
  <circle cx="56" cy="28" r="2.5" fill="#1565c0"/>

  <!-- HEAD -->
  <!-- Neck -->
  <rect x="27" y="14" width="10" height="5" rx="2" fill="#1565c0"/>
  <!-- Face shape (human head) -->
  <ellipse cx="32" cy="12" rx="10" ry="11" fill="#1a237e"/>
  <!-- Wetsuit hood covers most of head -->
  <ellipse cx="32" cy="10" rx="9.5" ry="10" fill="url(#wetsuit)"/>
  <!-- Face window -->
  <ellipse cx="32" cy="12" rx="6" ry="6" fill="#1a1a2e"/>

  <!-- DIVE MASK -->
  <!-- Mask skirt -->
  <ellipse cx="32" cy="13" rx="7.5" ry="5.5" fill="none" stroke="#111" stroke-width="1.5"/>
  <!-- Mask lens -->
  <ellipse cx="32" cy="13" rx="6" ry="4" fill="url(#maskGrad)" opacity="0.9"/>
  <!-- Mask lens reflection -->
  <ellipse cx="33" cy="12" rx="2.5" ry="1.8" fill="white" opacity="0.25"/>
  <ellipse cx="33" cy="11.5" rx="1.2" ry="0.8" fill="white" opacity="0.4"/>
  <!-- Mask strap -->
  <path d="M23.5 13 Q20 11 19 14" fill="none" stroke="#111" stroke-width="1.2"/>
  <path d="M40.5 13 Q44 11 45 14" fill="none" stroke="#111" stroke-width="1.2"/>

  <!-- LEGS -->
  <!-- Left leg -->
  <path d="M21 60 L18 72" stroke="#1976d2" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Right leg -->
  <path d="M43 60 L46 72" stroke="#1976d2" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- LEFT FIN -->
  <g>
    <path d="M18 72 L16 78 L10 85 Q16 84 20 79 L20 75 Z" fill="url(#finGrad)"/>
    <path d="M13 81 Q15 83 18 80" fill="none" stroke="#0a3d7a" stroke-width="0.8" opacity="0.5"/>
    <path d="M15 79 Q17 81 19 78" fill="none" stroke="#0a3d7a" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- RIGHT FIN -->
  <g>
    <path d="M46 72 L48 78 L54 85 Q48 84 44 79 L44 75 Z" fill="url(#finGrad)"/>
    <path d="M51 81 Q49 83 46 80" fill="none" stroke="#0a3d7a" stroke-width="0.8" opacity="0.5"/>
    <path d="M49 79 Q47 81 45 78" fill="none" stroke="#0a3d7a" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- WAIST BELT / WEIGHTS -->
  <rect x="18" y="58" width="28" height="3" rx="1.5" fill="#263238"/>
  <rect x="20" y="58.5" width="4" height="2" rx="0.5" fill="#37474f"/>
  <rect x="28" y="58.5" width="8" height="2" rx="0.5" fill="#37474f"/>
  <rect x="40" y="58.5" width="4" height="2" rx="0.5" fill="#37474f"/>
</svg>
